name: CI
on:
  push:
    branches: [main]
  pull_request:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc --noEmit -p server/tsconfig.json
      - run: npx tsc --noEmit -p client/tsconfig.json
      - run: npx vitest run
