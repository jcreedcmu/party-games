name: Preview
on: workflow_dispatch
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsx --tsconfig client/tsconfig.json scripts/gen-preview.tsx
      - uses: actions/upload-artifact@v4
        with:
          name: preview
          path: preview-dist/
